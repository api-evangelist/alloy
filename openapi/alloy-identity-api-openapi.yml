  /parameters:
    get:
      summary: Returns a list of required and optional inputs
      description: 'Given a workflow specified by the header, the API returns a list
        of required and optional inputs for running an evaluation through the designated
        workflow. Alloy''s API is dynamic, and thus the input parameters vary depending
        on which services are run and how the workflow is configured. Hitting the
        `GET /parameters` endpoint will show exactly what your initial `POST /evaluations`
        request to the Alloy API should look like. All attributes will either be always
        required, conditionally required, or optional. For instance, in the example
        here, you either have to pass `document_ssn` OR both `document_license` and
        `document_license_state`. Note that this response body is just an example,
        and the exact parameters of your workflow version will vary.

        '
      tags:
      - Evaluations
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
          description: 'Basic authorization header per the OAuth Client Authorization
            Header standard.


            The format is `Basic <auth_string>`, where `<auth_string>` is the base64
            encoding of the string `token:secret` (check [Authentication Guide](https://developer.alloy.com/public/docs/authentication-guide)
            for details).

            '
      - in: header
        name: alloy-workflow-token
        schema:
          type: string
          description: "If you have migrated to the new API Key Settings page and\
            \ are using account-level API keys for authentication, this header is\
            \ required to specify which workflow to use for the evaluation. \n\nIf\
            \ you have not migrated yet, this header is optional, as the workflow\
            \ will be determined by the Authorization header using workflow_token.\n"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  required:
                    type: array
                    description: The required fields for this workflow
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          example: name_first
                        type:
                          type: string
                          example: string
                        description:
                          type: string
                          example: First name
                        regex:
                          type: string
                          example: ^[^d]*$
                        properties:
                          type: object
                  optional:
                    type: array
                    description: The optional fields for this workflow
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          example: email_address
                        type:
                          type: string
                          example: string
                        description:
                          type: string
                          example: Email address
                        regex:
                          type: string
                          example: ''
                        properties:
                          type: object
                  or:
                    type: array
                    description: Fields that may be required for this workflow
                    items:
                      type: object
                      properties:
                        required:
                          type: array
                          items:
                            type: object
                            properties:
                              key:
                                type: string
                                example: document_license
                              type:
                                type: string
                                example: string
                              description:
                                type: string
                                example: US issued drivers license number
                              regex:
                                type: string
                                example: ''
                              properties:
                                type: object
