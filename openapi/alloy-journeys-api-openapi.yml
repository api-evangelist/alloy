        '401':
          description: Authentication Failure
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1applications~1%7Bjourney_application_token%7D~1review~1%7Bmanual_review_token%7D/get/responses/401/content/application~1json/schema'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  properties:
                    status_code:
                      type: string
                      example: 404
                    error:
                      type: object
                      properties:
                        minor_code:
                          type: number
                          example: 4041
                        type:
                          type: string
                          example: Not Found
                        message:
                          type: string
                          example: Unable to find the requested resource
                        details:
                          type: object
                          properties:
                            journey_token:
                              type: string
                              example: J-dT8zCu7TQo5tfXzSgrBX
                            journey_application_token:
                              type: string
                              example: JA-mmVXL2SMEfVQ2pZhszlGX
                        error_token:
                          type: string
                          example: 1731f999-7390-4e28-be34-9bbbee5251a2
                    timestamp:
                      type: number
                      example: 1725386185011
                    evaluation_token:
                      type: string
                      example: null
                    entity_token:
                      type: string
                      example: null
                    application_token:
                      type: string
                      example: nsDnk3oWWaKg2doAv9RWGrRnPOPsy1fX
                    application_version_id:
                      type: string
                      example: null
        '429':
          description: Rate Limit Exceeded
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  properties:
                    status_code:
                      type: string
                      example: 429
                    error:
                      type: object
                      properties:
                        minor_code:
                          type: integer
                          example: 4033
                        type:
                          type: string
                          example: Rate Limit Exceeded
                        message:
                          type: string
                          example: You have reached the maximum rate.
                        details:
                          type: object
                          additionalProperties: true
                        error_token:
                          type: string
                    timestamp:
                      type: integer
                      example: 1737562731251
                    evaluation_token:
                      type: string
                      nullable: true
                      example: null
                    entity_token:
                      type: string
                      nullable: true
                      example: null
                    application_token:
                      type: string
                    application_version_id:
                      type: string
                      nullable: true
                      example: null
        '500':
          description: Unhandled Service Error
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  properties:
                    status_code:
                      type: string
                      example: 500
                    error:
                      type: object
                      properties:
                        minor_code:
                          type: number
                          example: 5000
                        type:
                          type: string
                        message:
                          type: string
                        error_token:
                          type: string
                          example: 31e6e353-e62b-4fe2-be16-ea37ea9a992c
                    timestamp:
                      type: number
                      example: 1725386185011
                    evaluation_token:
                      type: string
                      example: null
                    entity_token:
                      type: string
                      example: null
                    application_token:
                      type: string
                    application_version_id:
                      type: string
                      example: null
        '503':
          description: Temporarily Offline for Maintenance
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/paths/~1investigations~1%7Binvestigation_token%7D~1review/put/responses/404/content/application~1json/schema/allOf/0'
    put:
      parameters:
      - $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1applications/parameters/1'
      tags:
      - Journeys
      summary: Update Journey Application
      description: "This endpoint has 3 different use cases:\n\n  * Send the additional or updated data required to advance the application.\n    * Only available if one or more entity applications have the statuses `pending_documents`, `pending_step_up`, or `data_request`.\n  * Send new, additional entities to be processed.\n    * Only available if the parameter `do_await_additional_entities` was set to `true` in the POST request to create the journey application.\n  * Inform the system that the user has finished sending all additional entities by passing the parameter `has_finished_sending_additional_entities` with value `true`.\n    * Only available if the parameter `do_await_additional_entities` was set to `true` in the POST request to create the journey application.\n\nAny of the headers used with the original application (ex: `alloy-sandbox`) will also be used here.\n"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/paths/~1journeys~1applications~1ext~1%7Bexternal_application_id%7D~1latest/put/requestBody/content/application~1json/schema'
      responses:
        '200':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1applications/post/responses/201'
        '400':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1batches/post/responses/400'
        '401':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/401'
        '404':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/404'
        '409':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1batches/post/responses/409'
        '429':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/429'
        '500':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/500'
        '503':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/503'
  /journeys/{journey_token}/applications:
    parameters:
    - in: path
      name: journey_token
      schema:
        type: string
      required: true
      description: Token associated with your Journey
      example: J-VCQoADBJxeHtmdAvFqoS
    - in: header
      name: alloy-journey-override-sync
      schema:
        type: boolean
        description: 'This endpoint returns a synchronous response by default. If you would like to override this behavior and get an asynchronous response back immediately, send the header `alloy-journey-override-sync` as `true`.

          '
        example: false
    - in: query
      name: fullData
      description: If this value is `true`, each event of type `completed_evaluation` in the array at `response._embedded._events` includes the full evaluation response.
      schema:
        type: string
        enum:
        - 'true'
        - 'false'
    - in: query
      name: hideFields
      description: 'A comma separated list of fields to obfuscate in the full evaluation response (only relevant within the `completed_evaluation` type events, and provided the query parameter `fullData` is also set to `true`).

        For example, if `hideFields=document_ssn`, then `"document_ssn": "123456789"` would be returned as `"document_ssn": "*********"`.

        This obfuscation will apply to the `supplied`, `formatted`, and `meta` objects in the full evaluation response, including inside nested objects within those objects.

        '
      schema:
        type: string
      example: name_first,name_last,document_ssn
    - $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/parameters/1'
    - in: header
      name: alloy-sandbox
      schema:
        type: boolean
      description: 'To run the application using Alloy''s sandbox environment, set this header to `true`.

        '
      example: true
    - in: header
      name: alloy-sandbox-services
      schema:
        type: string
      description: 'A comma separated list of services that should be run using Alloy''s sandbox environment.

        '
      example: Socure3,EnhancedPersonSearch
    - in: header
      name: alloy-refresh-cache
      schema:
        type: boolean
        description: 'To refresh any cached responses from external services, set this header to `true`.

          '
        example: true
    - in: header
      name: alloy-multi-environment-config-token
      schema:
        type: string
        description: 'Specifies the Multi-Environment Configuration to be used with this application.

          '
        example: MEC-1t94UrgAwOGmaVUy94rK
    post:
      tags:
      - Journeys
      summary: Create Journey Application
      description: 'Create a journey application for one or more entities.

        '
      requestBody:
        content:
          application/json:
            schema:
              required:
              - entities
              properties:
                entities:
                  type: array
                  description: 'List of entities to be processed in this Application.

                    '
                  items:
                    anyOf:
                    - title: Person Entity
                      $ref: '#/paths/~1journeys~1applications~1ext~1%7Bexternal_application_id%7D~1latest~1rerun/post/requestBody/content/application~1json/schema/properties/entities/items'
                    - title: Business Entity
                      allOf:
                      - type: object
                        required:
                        - data
                        properties:
                          external_entity_id:
                            example: my_system_entity_id_345
                            type: string
                            description: 'The value used on client''s own system to identify the entity.

                              If an entity associated with the value passed in already exists, then the entity application processes for that entity. Otherwise, a new entity is created and associated with the value passed in.

                              This parameter is optional, but strongly encouraged.

                              '
                          data:
                            type: object
                            description: 'Contains the fields for each input attribute of each workflow in the journey that is expected to be processed for the entity.

                              '
                            properties:
                              business_name:
                                type: string
                                example: Acme Corporation
                              business_federal_ein:
                                type: string
                                description: Business federal employer ID number for US business entities.
                                example: 122334455
                              business_registry_id:
                                type: string
                                description: Business registry ID number for non-US business entities.
                                example: 122334455
                              business_phone_number:
                                type: string
                                description: Business phone number.
                                example: 111222333
                              business_url:
                                type: string
                                description: Business website.
                                example: https://www.acmeco.com/
                              addresses:
                                type: array
                                description: 'List of addresses for the given entity.

                                  '
                                items:
                                  type: object
                                  description: Full address for a business entity
                                  properties:
                                    type:
                                      type: string
                                      description: Allowed values are `"business_primary"`, `"business_secondary"`, `"business_previous"`
                                      example: business_primary
                                    line_1:
                                      type: string
                                      example: 41 E. 11th
                                    line_2:
                                      type: string
                                      example: 2nd floor
                                    city:
                                      type: string
                                      example: New York
                                    state:
                                      type: string
                                      example: NY
                                    postal_code:
                                      type: string
                                      example: 10003
                                    country_code:
                                      type: string
                                      example: US
                              representatives:
                                type: array
                                description: List of ultimate beneficial owners associated to the business.
                                items:
                                  type: object
                                  description: Ultimate beneficial owners associated to the business.
                                  properties:
                                    name_first:
                                      type: string
                                      example: John
                                    name_middle:
                                      type: string
                                      example: Franklin
                                    name_last:
                                      type: string
                                      example: Doe
                                    type:
                                      type: string
                                      example: principal_owner
                                      description: Allowed values are `"principal_owner"`, `"authorized_signer"`, `"coborrower"`, `"joint"`, `"guarantor"`, or `"director"`.
                                    birth_date:
                                      type: string
                                      example: '1990-01-25'
                                    document_ssn:
                                      type: string
                                      description: Social Security number
                                      example: 111223333
                                    email_address:
                                      type: string
                                      example: john@alloy.com
                                    phone_number:
                                      type: string
                                      example: 8443825569
                                    ownership_percentage:
                                      type: string
                                      example: 66.6
                                    addresses:
                                      type: array
                                      description: 'List of addresses for the given entity.

                                        '
                                      items:
                                        $ref: '#/paths/~1journeys~1applications~1ext~1%7Bexternal_application_id%7D~1latest~1rerun/post/requestBody/content/application~1json/schema/properties/entities/items/allOf/0/properties/data/properties/addresses/items'
                              meta:
                                type: object
                                description: Any additional metadata to be accessed for decisioning or review purposes that are not sent to a data service can be referenced here.
                                example:
                                  sic_code: 1531
                      - type: object
                        properties:
                          entity_type:
                            example: business
                            default: business
                            type: string
                            description: If left blank, defaults to `"business"`.
                          branch_name:
                            example: my_business_branch_name
                            default: businesses
                            type: string
                            description: 'This value is required for journeys with multiple branches. It must match a journey branch configured from the start node. It is used to determine

                              which steps the entity will be required to complete.

                              '
                          entity_token:
                            example: B-4vaKI3CAgBvpdLpMifon
                            type: string
                            description: 'The token associated with an existing entity.

                              By passing a value for this field, the entity application processes for the existing entity associated with the token.

                              '
                  example:
                  - external_entity_id: my_system_entity_id_123
                    data:
                      name_first: John
                      name_middle: Franklin
                      name_last: Doe
                      birth_date: '1990-01-25'
                      document_ssn: 111223333
                      email_address: john@alloy.com
                      phone_number: 8443825569
                      ip_address_v4: 42.206.213.70
                      addresses:
                      - type: primary
                        line_1: 41 E. 11th
                        line_2: 2nd floor
                        city: New York
                        state: NY
                        postal_code: 10003
                        country_code: US
                      meta:
                        user_type: vip
                    entity_type: person
                    branch_name: persons
                  - external_entity_id: my_system_entity_id_345
                    data:
                      business_name: Acme Corporation
                      business_federal_ein: 122334455
                      business_phone_number: 111222333
                      business_url: https://www.acmeco.com/
                      addresses:
                      - type: business_primary
                        line_1: 41 E. 11th
                        line_2: 2nd floor
                        city: New York
                        state: NY
                        postal_code: 10003
                        country_code: US
                      representatives:
                      - name_first: John
                        name_middle: Franklin
                        name_last: Doe
                        type: principal_owner
                        birth_date: '1990-01-25'
                        document_ssn: 111223333
                        email_address: john@alloy.com
                        phone_number: 8443825569
                        ownership_percentage: 40
                        addresses:
                        - type: primary
                          line_1: 41 E. 11th
                          line_2: 2nd floor
                          city: New York
                          state: NY
                          postal_code: 10003
                          country_code: US
                      meta:
                        sic_code: 1531
                    entity_type: business
                    branch_name: businesses
                external_group_id:
                  type: string
                  description: 'Optional, but if you have an identifier in your system that is unique and that you would like to tie to an

                    Application in a 1:1 relationship, you can include it here. This field will not update the Entity Group object.

                    '
                  example: my_system_group_id_456
                external_application_id:
                  type: string
                  description: 'Optional, but if you have an identifier in your system that refers to an application or an entire account,

                    and you would like to associate it with one or more Journey Applications, you can include it here. We also have

                    a number of endpoints that allow you to reference a Journey Application by external application id instead of by

                    Journey Application token when retrieving, rerunning or updating the Application. Supported characters are: `a-zA-Z0-9_-`

                    '
                do_await_additional_entities:
                  type: boolean
                  default: false
                  example: false
                  description: 'If this value is true, additional entities can be sent by using the PUT endpoint that updates a Journey Application.


                    The Journey Application will not complete until the parameter `has_finished_sending_additional_entities` is sent with the value `true` to the PUT endpoint.

                    '
                application_meta:
                  type: object
                  description: 'Optional, allows to provide additional metadata applied to all entities in the Application.

                    '
                external_entity_group_id:
                  type: string
                  description: 'Optional, but if you wish to associate the entities within this application with an existing entity group

                    or create a new entity group with this identifier, you can include it here.


                    For more information on entity groups, visit our guide: https://developer.alloy.com/public/docs/onboarding-with-entity-groups

                    '
                entity_group_token:
                  type: string
                  description: 'Optional, but if you wish to associate the entities within this application with an existing entity group, you can include it here.

                    '
                entity_group_name:
                  type: string
                  description: 'Optional, but if you wish to create a new entity group with this name, you can include it here.

                    '
                entity_group_type:
                  type: string
                  enum:
                  - business
                  - joint_account
                  - membership
                  - merchant
                  description: 'Optional, but if you wish to create a new entity group with this type, you can include it here.

                    '
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                - allOf:
                  - $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1applications~1%7Bjourney_application_token%7D/get/responses/200/content/application~1json/schema'
                  - title: When header `alloy-journey-override-sync` is set to `false` or not passed in
                - allOf:
                  - $ref: '#/paths/~1journeys~1applications~1ext~1%7Bexternal_application_id%7D~1latest/put/responses/200/content/application~1json/schema/oneOf/0/allOf/1'
                  - title: When header `alloy-journey-override-sync` is set to `true`
        '400':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1batches/post/responses/400'
        '401':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/401'
        '404':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/404'
        '409':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1batches/post/responses/409'
        '429':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/429'
        '500':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/500'
        '503':
          $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/get/responses/503'
components:
  securitySchemes:
    basic:
      type: http
      description: HTTP basic authorization using a workflow token and secret
      scheme: basic
    oauth2:
      type: oauth2
      description: OAuth2 using a workflow token and secret to generate a bearer token
      flows:
        clientCredentials:
          tokenUrl: /oauth/bearer
          scopes: {}
