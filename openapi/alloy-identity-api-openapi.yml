      example: J-VCQoADBJxeHtmdAvFqoS
    - in: header
      name: alloy-journey-override-sync
      schema:
        type: boolean
        description: 'This endpoint returns a synchronous response by default. If
          you would like to override this behavior and get an asynchronous response
          back immediately, send the header `alloy-journey-override-sync` as `true`.

          '
        example: false
    - in: query
      name: fullData
      description: If this value is `true`, each event of type `completed_evaluation`
        in the array at `response._embedded._events` includes the full evaluation
        response.
      schema:
        type: string
        enum:
        - 'true'
        - 'false'
    - in: query
      name: hideFields
      description: 'A comma separated list of fields to obfuscate in the full evaluation
        response (only relevant within the `completed_evaluation` type events, and
        provided the query parameter `fullData` is also set to `true`).

        For example, if `hideFields=document_ssn`, then `"document_ssn": "123456789"`
        would be returned as `"document_ssn": "*********"`.

        This obfuscation will apply to the `supplied`, `formatted`, and `meta` objects
        in the full evaluation response, including inside nested objects within those
        objects.

        '
      schema:
        type: string
      example: name_first,name_last,document_ssn
    - $ref: '#/paths/~1journeys~1%7Bjourney_token%7D~1schema/parameters/1'
    - in: header
      name: alloy-sandbox
