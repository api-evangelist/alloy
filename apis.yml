aid: alloy
name: Alloy
description: >-
  Alloy is an identity decisioning platform that provides a single REST API for
  running KYC/KYB workflows, evaluating applicant risk, automating compliance
  decisions, and managing ongoing monitoring throughout the customer lifecycle.
  The platform connects banks and fintechs to more than 85 data sources for
  fraud prevention, credit underwriting, transaction monitoring, and regulatory
  compliance via configurable workflow-based evaluations and journey applications.
