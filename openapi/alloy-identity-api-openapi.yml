  /evaluations:
    post:
      summary: Runs an evaluation
      description: 'Given a workflow specified by the header, the API will run an
        evaluation with the provided payload. Alloy''s API is dynamic, and thus the
        input parameters vary depending on which services are run and how the workflow
        is configured.

        '
      tags:
      - Evaluations
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
          description: 'Basic authorization header per the OAuth Client Authorization
            Header standard.


            The format is `Basic <auth_string>`, where `<auth_string>` is the base64
            encoding of the string `token:secret` (check [Authentication Guide](https://developer.alloy.com/public/docs/authentication-guide)
            for details).

            '
      - in: header
        name: alloy-workflow-token
        schema:
          type: string
          description: "If you have migrated to the new API Key Settings page and\
            \ are using account-level API keys for authentication, this header is\
            \ required to specify which workflow to use for the evaluation. \n\nIf\
            \ you have not migrated yet, this header is optional, as the workflow\
            \ will be determined by the Authorization header using workflow_token.\n"
      - in: header
        name: alloy-entity-token
        schema:
          type: string
          description: 'If running an additional evaluation for an existing entity
            - the existing entity token can be provided to connect the new evaluation
            to the entity.

            '
      - in: header
        name: alloy-external-entity-id
        schema:
          type: string
          description: 'A string to identify the entity created by the evaluation
            in your system.

            '
      - in: header
        name: alloy-parent-entity-token
        schema:
          type: string
          description: 'A token of an entity to be used as a parent entity.

            '
      - in: header
        name: alloy-entity-type
        schema:
          description: 'For transactions workflows, specifies whether the entity associated
            with

            the evaluation is a `business` or `person` entity. Defaults to `person`.

            '
          type: string
          enum:
          - business
          - person
      - in: header
        name: alloy-hydrate-counterparty-data
        schema:
          type: boolean
          description: 'Optional boolean value, required to be true for using counterparty
            sanction screening in a transaction workflow.

            '
      - in: header
        name: alloy-hydrate-entity-data
        schema:
          type: boolean
          description: 'Optional boolean value, required to be true for using source
            entity sanction screening in a transaction workflow.

            '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - title: Evaluation Body
                $ref: '#/paths/~1evaluations~1%7Bevaluation_token%7D/patch/requestBody/content/application~1json/schema'
              - title: Transaction Evaluation Body
                allOf:
                - type: object
                  allOf:
                  - $ref: '#/paths/~1transactions~1%7Btransaction_id%7D/patch/requestBody/content/application~1json/schema/allOf/0'
                  required:
                  - transaction_id
                  - transaction_date
                  - amount
                  - source
                  - destination
                  - currency
      x-samples-languages:
      - shell
      responses:
        '200':
          description: Evaluation missing required inputs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: string
                  error:
                    type: object
                  timestamp:
                    type: number
                  evaluation_token:
                    type: string
                  entity_token:
                    type: string
                  application_token:
                    type: string
                  application_version_id:
                    type: number
                  required:
                    type: array
                    description: The required fields for this workflow
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          example: name_first
                        type:
                          type: string
                          example: string
                        description:
                          type: string
                          example: First name
                        regex:
                          type: string
                          example: ^[^d]*$
                        properties:
                          type: object
                  optional:
                    type: array
                    description: The optional fields for this workflow
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          example: email_address
                        type:
                          type: string
                          example: string
                        description:
                          type: string
                          example: Email address
                        regex:
                          type: string
                          example: ''
                        properties:
                          type: object
        '201':
          description: Evaluation created
          content:
            application/json:
              schema:
                properties:
                  status_code:
                    type: string
                  error:
                    type: object
                  timestamp:
                    type: number
                  evaluation_token:
                    type: string
                  entity_token:
                    type: string
                  application_token:
                    type: string
                  application_version_id:
                    type: number
                  summary:
                    type: object
                    properties:
                      result:
                        type: string
                      score:
                        type: number
                      tags:
                        type: array
                      outcome_reasons:
                        type: array
                      outcome:
                        type: string
                      services:
                        type: object
                        description: A map of service names to their execution statuses.
                          Keys are dynamic and represent services in the Workflow.
                        additionalProperties:
                          type: string
                          enum:
                          - executed
                          - not_executed
                          - cached
                          - failed
                      custom_fields:
                        type: object
                        description: A map of custom field names to their values.
                          Keys are dynamic and represent input attributes defined
                          in the Workflow.
                      models:
                        type: object
                        description: A map of output attribute names to their values.
                          Keys are dynamic and represent output attributes defined
                          in the Workflow.
                  supplied:
                    type: object
                  formatted:
                    type: object
                  matching:
                    type: object
                  diligence:
                    type: object
                  related_data:
                    type: object
                  raw_responses:
                    type: object
                  formatted_responses:
                    type: object
                  audit_archive:
                    type: object
                  warnings:
                    type: object
                    description: Warnings about the evaluation, such as missing data
                      that resulted in a partial response.
                    properties:
                      blocked_actions:
                        type: array
                        description: A list of actions (tags, services) that were
                          blocked during the evaluation due to missing data or other
                          issues.
                        items:
                          type: object
                          properties:
                            blocked:
                              type: object
                              properties:
                                action_name:
                                  type: string
                                  description: The name of the action that was blocked.
                                action_type:
                                  type: string
                                  description: The type of the action that was blocked.
                            blocking:
                              type: object
                              properties:
                                action_name:
                                  type: string
                                  description: The name of the service that caused
                                    the block.
                                attribute_name:
                                  type: string
                                  description: The specific attribute that caused
                                    the block.
