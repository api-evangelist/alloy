apis:
  - aid: alloy:alloy-identity-api
    name: Alloy Identity API
    description: >-
      The Alloy Identity API provides endpoints for creating and managing person
      and business entities, running evaluations through configurable risk
      workflows, managing journey applications, submitting events for ongoing
      monitoring, handling document verification, and managing investigations and
      case alerts. Authentication is via Basic HTTP credentials or OAuth 2.0
      Client Credentials. A sandbox environment is available at
      sandbox.alloy.co for testing.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.alloy.com/public/docs/introduction
    baseURL: https://sandbox.alloy.co/v1
